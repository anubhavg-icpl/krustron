{{- /*
Krustron secrets. The deployment already mounts database-password, redis-password
and jwt-secret from <release>-secrets, but no template created it, so every
default install CrashLoopBackoff'd on the missing env source.

If `auth.existingSecret` (or the per-service existingSecret) is set, operators
bring their own Secret and this template is skipped. Otherwise we require the
values explicitly (matching the API's fail-fast on an empty JWT secret) rather
than silently generating one: a generated JWT secret would rotate on every
`helm upgrade` and invalidate all issued tokens.
*/ -}}
{{- if not .Values.auth.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "krustron.fullname" . }}-secrets
  labels:
    {{- include "krustron.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-password: {{ required "database.password is required (or set auth.existingSecret and the per-service existingSecret values)" .Values.database.password | quote }}
  redis-password: {{ required "redis.password is required (or set auth.existingSecret and the per-service existingSecret values)" .Values.redis.password | quote }}
  jwt-secret: {{ required "auth.jwtSecret is required and must be >=32 bytes (or set auth.existingSecret)" .Values.auth.jwtSecret | quote }}
{{- end -}}
